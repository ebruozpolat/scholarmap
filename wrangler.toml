name = "scholarmap"
main = "api/cf-worker.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# ── Custom Domain ──
# scholarmap.io is already purchased on Cloudflare
# These routes auto-connect the Worker to your domain.
# Temporarily disabled to deploy to the *.workers.dev subdomain first.
# Re-enable once the scholarmap.io zone is added to this Cloudflare account.
# [[routes]]
# pattern = "scholarmap.io"
# custom_domain = true

# [[routes]]
# pattern = "www.scholarmap.io"
# custom_domain = true

workers_dev = true

# ── D1 Database ──
# Create: npx wrangler d1 create scholarmap-db
# Then replace database_id below with the real ID
[[d1_databases]]
binding = "DB"
database_name = "scholarmap-db"
database_id = "9a9ab3e1-4e76-4400-a6ec-df6c996b9450"

# ── Environment Variables ──
[vars]
APP_URL = "https://scholarmap.io"
KIMI_AUTH_URL = "https://api.kimi.moonshot.cn"

# ── Secrets (set via: npx wrangler secret put <NAME>) ──
# KIMI_CLIENT_ID
# KIMI_CLIENT_SECRET  
# SESSION_SECRET
# JWT_SECRET
# STRIPE_SECRET_KEY
# STRIPE_PUBLISHABLE_KEY
# STRIPE_PRO_PRICE_ID
# STRIPE_WEBHOOK_SECRET

# ── Build ──
[build]
command = "npm run build:cf"

# ── Static Assets ──
[site]
bucket = "./dist/public"
